<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TrainBot — Coach IA Brico Dépôt</title>
  <meta name="description" content="Entraîne-toi sur des scénarios métier réels avec ton coach IA. Propulsé par emlyon × Brico Dépôt." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --em-red: #E2001A;
      --em-red-light: #fff0f1;
      --em-red-border: #f9c0c5;
      --bd-yellow: #F5A623;
      --bd-yellow-light: #fff8ed;
      --bd-green: #2E7D32;
      --bd-green-light: #e8f5e9;
      --bd-green-border: #a5d6a7;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #f8f8f8;
      --border: #e0e0e0;
      --border-md: #d0d0d0;
      --text: #1a1a1a;
      --text-2: #555;
      --text-3: #999;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-pill: 100px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── LAYOUT ── */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    /* ── HEADER ── */
    #header {
      background: var(--em-red);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #header-logo {
      width: 40px; height: 40px;
      background: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: var(--em-red);
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    #header-text { flex: 1; }
    #header-title { color: white; font-size: 16px; font-weight: 600; }
    #header-sub { color: rgba(255,255,255,0.78); font-size: 12px; margin-top: 1px; }
    #status { display: flex; align-items: center; gap: 5px; }
    #status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }
    #status-label { font-size: 11px; color: rgba(255,255,255,0.7); }

    /* ── SCENARIO SCREEN ── */
    #scenario-screen { flex: 1; padding: 20px 16px 24px; display: flex; flex-direction: column; gap: 14px; }

    .screen-intro { text-align: center; padding: 4px 0 8px; }
    .screen-intro h2 { font-size: 17px; font-weight: 600; color: var(--text); }
    .screen-intro p { font-size: 13px; color: var(--text-2); margin-top: 5px; line-height: 1.5; }

    .scenario-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .scenario-card:hover {
      border-color: var(--em-red);
      box-shadow: 0 2px 16px rgba(226,0,26,0.1);
    }
    .scenario-card:active { transform: scale(0.98); }

    .sc-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .sc-icon-0 { background: var(--em-red-light); }
    .sc-icon-1 { background: var(--bd-yellow-light); }
    .sc-icon-2 { background: var(--bd-green-light); }
    .sc-icon-3 { background: #e3f2fd; }

    .sc-info { flex: 1; }
    .sc-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .sc-desc { font-size: 12px; color: var(--text-2); margin-top: 3px; line-height: 1.4; }
    .sc-arrow { color: var(--text-3); font-size: 18px; flex-shrink: 0; }

    /* ── CHAT SCREEN ── */
    #chat-screen { flex: 1; display: none; flex-direction: column; }

    #chat-topbar {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      flex-shrink: 0;
    }
    #back-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-2); font-size: 22px;
      display: flex; align-items: center; padding: 2px;
      border-radius: 6px;
    }
    #back-btn:hover { background: var(--border); }
    #chat-badge {
      font-size: 12px; font-weight: 600;
      padding: 4px 11px;
      border-radius: var(--radius-pill);
      background: var(--em-red-light);
      color: var(--em-red);
      border: 1px solid var(--em-red-border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    #reset-btn {
      margin-left: auto;
      background: none; border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-2);
      font-size: 12px;
      padding: 5px 10px;
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    #reset-btn:hover { background: var(--surface2); border-color: var(--border-md); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .bot .avatar { background: var(--em-red); color: white; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bot .bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .user .bubble {
      background: var(--em-red);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* typing */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .typing-dots span {
      width: 8px; height: 8px;
      background: var(--text-3);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

    /* feedback */
    #feedback-bar {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }
    #feedback-btn {
      width: 100%;
      padding: 11px;
      background: var(--bd-green-light);
      border: 1px solid var(--bd-green-border);
      border-radius: 10px;
      color: var(--bd-green);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #feedback-btn:hover { background: #d0ecd1; }

    /* input */
    #input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      border: 1px solid var(--border-md);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 14px;
      resize: none;
      font-family: inherit;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--em-red); }
    #user-input::placeholder { color: var(--text-3); }

    #send-btn {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: var(--em-red);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; flex-shrink: 0;
      font-size: 18px;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* footer */
    #footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: var(--surface2);
    }
    #footer-left { font-size: 11px; color: var(--text-3); }
    .badges { display: flex; gap: 6px; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
    }
    .badge-em { background: var(--em-red-light); color: var(--em-red); border: 1px solid var(--em-red-border); }
    .badge-bd { background: var(--bd-yellow-light); color: #8B5E00; border: 1px solid #f0c870; }

    /* error toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: white;
      padding: 10px 18px; border-radius: 20px;
      font-size: 13px; z-index: 100;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
        --border: #2e2e2e; --border-md: #3a3a3a;
        --text: #f0f0f0; --text-2: #aaa; --text-3: #666;
        --em-red-light: #2d0007; --em-red-border: #5a0010;
        --bd-yellow-light: #2a1d00; --bd-green-light: #0a1f0a; --bd-green-border: #2d6b30;
      }
    }
  </style>
</head>

<div id="toast"></div>

<script>
  // ⚠️ REMPLACE PAR TON URL RAILWAY APRÈS DÉPLOIEMENT
  const API_BASE = "https://TON-SERVICE.up.railway.app";

  const SCENARIO_LABELS = [
    "🛒 Simuler une vente",
    "📋 Étude de cas RNCP",
    "👋 Prise de congé",
    "📊 Mes indicateurs"
  ];

  let currentScenario = null;
  let messages = [];
  let msgCount = 0;
  let loading = false;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function startScenario(idx) {
    currentScenario = idx;
    messages = [];
    msgCount = 0;
    document.getElementById('scenario-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex';
    cs.style.flexDirection = 'column';
    document.getElementById('chat-badge').textContent = SCENARIO_LABELS[idx];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('feedback-bar').style.display = 'none';
    callAPI("Commence la session maintenant.", true);
  }

  function goBack() {
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('scenario-screen').style.display = 'flex';
  }

  function resetChat() { startScenario(currentScenario); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || loading) return;
    input.value = '';
    input.style.height = 'auto';
    appendMsg('user', text);
    messages.push({ role: 'user', content: text });
    callAPI(text, false);
  }

  function askFeedback() {
    const text = "Peux-tu me donner un feedback détaillé sur ma performance dans cette session ?";
    appendMsg('user', text);
    messages.push({ role: 'user', content: text });
    callAPI(text, false);
  }

  function appendMsg(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const formatted = text.replace(/\n/g, '<br>');
    if (role === 'bot') {
      div.innerHTML = `<div class="avatar" aria-hidden="true">IA</div><div class="bubble">${formatted}</div>`;
      msgCount++;
      if (msgCount >= 3) document.getElementById('feedback-bar').style.display = 'block';
    } else {
      div.innerHTML = `<div class="bubble">${formatted}</div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing-indicator';
    div.innerHTML = `<div class="avatar" aria-hidden="true">IA</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function callAPI(userText, isInit) {
    loading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    const payload = {
      scenario_id: currentScenario,
      messages: isInit
        ? [{ role: 'user', content: userText }]
        : [...messages]
    };

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Erreur ${res.status}`);
      }

      const data = await res.json();
      removeTyping();
      appendMsg('bot', data.reply);
      messages.push({ role: 'assistant', content: data.reply });

    } catch (e) {
      removeTyping();
      appendMsg('bot', "Une erreur est survenue. Vérifie ta connexion et réessaie.");
      showToast("Erreur : " + e.message);
    }

    loading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
</script>
</body>
</html>
